# Private dnsmasq instance for the USB gadget link only.
# DHCP only — DNS is disabled, and we deliberately do NOT advertise a default
# route or DNS server, so the phone keeps using its own cellular for internet
# and only routes 10.55.0.0/24 across the cable to the Pi.

interface=usb0
bind-interfaces
except-interface=lo
port=0                     # disable the DNS server entirely

dhcp-authoritative
dhcp-range=10.55.0.10,10.55.0.20,255.255.255.0,12h
dhcp-option=3              # (empty) no gateway
dhcp-option=6              # (empty) no DNS server
