# DHCP for the Pi-Tail USB-ethernet link (usb0) so a connected phone or PC
# auto-gets an IP and can reach the pi-netzero UI at http://192.168.42.254:8080.
#
# Pi-Tail leaves usb0 with a static address (192.168.42.254, via ifupdown) but
# runs NO DHCP server on it, so plugged-in devices never get an address. This
# adds one, bound to usb0 only via bind-dynamic — it never touches usb0's
# address and coexists with networkd's pan0 DHCP server (both use SO_REUSEADDR).
interface=usb0
bind-dynamic
except-interface=lo
port=0                  # DHCP only, no DNS server
dhcp-authoritative
dhcp-range=192.168.42.130,192.168.42.150,255.255.255.0,12h
dhcp-option=3           # no gateway (Pi has no upstream; the client keeps its own internet)
dhcp-option=6           # no DNS
