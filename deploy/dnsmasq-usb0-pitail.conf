# DHCP for the Pi-Tail USB-ethernet link (usb0) so a connected phone or PC
# auto-gets an IP and can reach the pi-netzero UI at http://192.168.42.254:8080.
#
# Pi-Tail leaves usb0 with a static address (192.168.42.254, via ifupdown) but
# runs NO DHCP server on it, so plugged-in devices never get an address. This
# adds one, bound to usb0 only via bind-dynamic — it never touches usb0's
# address and coexists with networkd's pan0 DHCP server (both use SO_REUSEADDR).
interface=usb0
bind-dynamic
except-interface=lo
dhcp-authoritative
log-dhcp                # log every DHCP exchange (so a phone that won't lease is visible)
dhcp-range=192.168.42.130,192.168.42.150,255.255.255.0,12h
dhcp-option=3           # no gateway (no internet to share in local-only mode)
# Serve DNS and hand the Pi out as the resolver, so a phone in local-only mode
# can open the UI by NAME -- http://netzero:8080 -- instead of an IP. (.local mDNS
# doesn't resolve in Android's browser; a DHCP-handed DNS name does.)
dhcp-option=6,192.168.42.254
address=/netzero/192.168.42.254
no-resolv               # offline in this mode: only answer 'netzero', don't stall on upstream
